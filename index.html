<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Scape</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #f1c40f; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .stats-panel { background-color: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .history-step { background: #1e272e; margin: 20px 0; padding: 20px; border-radius: 8px; border-left: 4px solid #7f8fa6; }
        .option { background: #2f3640; padding: 15px; border-radius: 6px; margin: 10px 0; border: 1px solid #353b48; }
        .label { font-weight: bold; color: #00a8ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Scape</h1>
    
    <div class="stats-panel">
        <h2>Account State: AI_grin</h2>
        <p>Your journey continues! Currently at Phase 7.</p>
    </div>

    <div id="content">
        <div class="history-step">
            <h3>🔥 Phase 7: New Decision</h3>
            <p>Choose your next path:</p>
            <div class="option">
                <h3>Option A: Unlock Herblore</h3>
                <div class="action"><span class="label">Action:</span> Complete "Druidic Ritual".</div>
            </div>
            <div class="option">
                <h3>Option B: Agility Progression</h3>
                <div class="action"><span class="label">Action:</span> Al Kharid Rooftop Course.</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
