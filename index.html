<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Scape</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #f1c40f; text-align: center; }
        .step { background: #1e272e; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #4cd137; }
        .current { border-left-color: #e74c3c; }
        .label { font-weight: bold; color: #00a8ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Scape</h1>
        
        <div class="step"><h3>Phase 1-6: Completed</h3><p>All early game milestones reached.</p></div>

        <div class="step current">
            <h2>🔥 Phase 7: Current Decision</h2>
            <p><strong>Option A: Unlock Herblore</strong><br>
            <span class="label">Action:</span> Complete "Druidic Ritual".</p>
            
            <p><strong>Option B: Agility & Marks of Grace</strong><br>
            <span class="label">Action:</span> Train at Al Kharid Rooftop.</p>
        </div>
    </div>
</body>
</html>
