<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scape</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 50px; }
        h1 { color: #f1c40f; text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 2.5rem; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stats-panel { background-color: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .history-step { background: #1e272e; margin: 20px 0; padding: 20px; border-radius: 8px; border-left: 4px solid #7f8fa6; transition: all 0.5s ease; }
        .current-step { border-left-color: #e74c3c; background: #252d35; }
        .options-container { display: flex; gap: 20px; margin-top: 15px; }
        .option { background: #2f3640; padding: 15px; border-radius: 6px; flex: 1; border: 1px solid #353b48; transition: all 0.3s ease; }
        .option-interactive { cursor: pointer; }
        .option-interactive:hover { border-color: #f1c40f; transform: translateY(-3px); }
        .selected { border: 2px solid #4cd137 !important; }
        .dimmed { opacity: 0.4; filter: grayscale(100%); }
        .label { font-weight: bold; color: #00a8ff; }
        .phase-title { font-size: 1.1rem; color: #ecf0f1; margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Scape</h1>
    <div class="stats-panel">
        <h2>Account State: AI_grin</h2>
        <ul id="statsList">
            <li><strong>Stats:</strong> Attack 30, Strength 30, Agility 20, Thieving 25, Hitpoints 10</li>
            <li><strong>Quests:</strong> 1 QP (Waterfall Quest completed)</li>
        </ul>
    </div>

    <div id="historyContainer">
        </div>
</div>

<script>
    const historyData = [
        { title: "Phase 1: Tutorial Island", optionA: "Pickpocket Men/Women", optionB: "X Marks the Spot" },
        { title: "Phase 2: Thieving Lvl 5", optionA: "Steal from Baker's Stalls", optionB: "Waterfall Quest" },
        { title: "Phase 3: Thieving Lvl 20", optionA: "Steal Silk", optionB: "Gnome Stronghold" },
        { title: "Phase 4: Thieving Lvl 25", optionA: "Agility Grind", optionB: "Waterfall Quest" },
        { title: "Phase 5: Agility Lvl 10", optionA: "Draynor Rooftop", optionB: "Waterfall Quest" },
        { title: "Phase 6: Agility Lvl 20", optionA: "Al Kharid Rooftop", optionB: "Waterfall Quest" }
    ];

    function renderHistory() {
        const container = document.getElementById('historyContainer');
        container.innerHTML = '';
        
        // Render completed phases
        historyData.forEach((step, index) => {
            const div = document.createElement('div');
            div.className = 'history-step';
            div.innerHTML = `<h2 class="phase-title">${step.title}</h2><div class="options-container"><div class="option selected"><h3>Option A</h3><div class="action">${step.optionA}</div></div></div>`;
            container.appendChild(div);
        });

        // Add Current Phase
        const current = document.createElement('div');
        current.className = 'history-step current-step';
        current.innerHTML = `
            <h2 class="phase-title">🔥 Phase 7: New Decision</h2>
            <p>What is your next move?</p>
            <div class="options-container">
                <div class="option option-interactive" onclick="alert('Progress Saved!')">
                    <h3>Option A: Unlock Herblore</h3>
                    <div class="action"><span class="label">Action:</span> Complete "Druidic Ritual".</div>
                </div>
                <div class="option option-interactive" onclick="alert('Progress Saved!')">
                    <h3>Option B: Agility & Marks of Grace</h3>
                    <div class="action"><span class="label">Action:</span> Train at Al Kharid Rooftop Course.</div>
                </div>
            </div>`;
        container.appendChild(current);
    }

    renderHistory();
</script>

</body>
</html>
