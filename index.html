<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Scape</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #f1c40f; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .history-step { background: #1e272e; margin: 20px 0; padding: 20px; border-radius: 8px; border-left: 4px solid #7f8fa6; }
        .current-step { border-left-color: #e74c3c; background: #252d35; }
        .options-container { display: flex; gap: 20px; margin-top: 15px; }
        .option { background: #2f3640; padding: 15px; border-radius: 6px; flex: 1; border: 1px solid #353b48; transition: 0.3s; }
        .option-interactive { cursor: pointer; }
        .option-interactive:hover { border-color: #f1c40f; transform: translateY(-3px); }
        .selected { border: 2px solid #4cd137 !important; }
        .label { font-weight: bold; color: #00a8ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Scape</h1>
        <div id="historyContainer"></div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('osrsHistory')) || [
            { id: 1, title: "Phase 1: Early Capital", action: "Pickpocket Men/Women" },
            { id: 2, title: "Phase 2: Food & Thieving", action: "Steal from Baker's Stalls" },
            { id: 3, title: "Phase 3: Seed Capital", action: "Steal Silk" },
            { id: 4, title: "Phase 4: Agility Grind", action: "Gnome Stronghold" },
            { id: 5, title: "Phase 5: Rooftop Agility", action: "Draynor Village" },
            { id: 6, title: "Phase 6: Combat Skip", action: "Waterfall Quest" }
        ];

        function render() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            
            history.forEach(step => {
                const div = document.createElement('div');
                div.className = 'history-step selected';
                div.innerHTML = `<h3>${step.title}</h3><p><span class="label">Action:</span> ${step.action}</p>`;
                container.appendChild(div);
            });

            const current = document.createElement('div');
            current.className = 'history-step current-step';
            current.innerHTML = `<h2>🔥 Phase ${history.length + 1}: Make a Choice</h2>
                <div class="options-container">
                    <div class="option option-interactive" onclick="makeChoice('Unlock Herblore')">
                        <h3>Option A: Unlock Herblore</h3>
                        <p><span class="label">Action:</span> Complete "Druidic Ritual"</p>
                    </div>
                    <div class="option option-interactive" onclick="makeChoice('Agility & Marks of Grace')">
                        <h3>Option B: Agility Training</h3>
                        <p><span class="label">Action:</span> Al Kharid Rooftop Course</p>
                    </div>
                </div>`;
            container.appendChild(current);
        }

        function makeChoice(choice) {
            history.push({ id: history.length + 1, title: `Phase ${history.length + 1}: Choice Made`, action: choice });
            localStorage.setItem('osrsHistory', JSON.stringify(history));
            render();
        }

        render();
    </script>
</body>
</html>
