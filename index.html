<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scape</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 50px; }
        h1 { color: #f1c40f; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 15px; font-size: 2.5rem; letter-spacing: 2px; }
        
        .stats-panel { background-color: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stats-panel h2 { color: #3498db; margin-top: 0; font-size: 1.3rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .history-step { background: #1e272e; margin: 20px 0; padding: 20px; border-radius: 8px; border-left: 4px solid #4cd137; animation: fadeIn 0.5s; }
        .current-step { border-left-color: #e74c3c; background: #252d35; box-shadow: 0 0 15px rgba(231, 76, 60, 0.2); }
        
        .options-container { display: flex; gap: 20px; margin-top: 15px; }
        @media (max-width: 768px) { .options-container { flex-direction: column; } }
        
        .option { background: #2f3640; padding: 15px; border-radius: 6px; flex: 1; border: 1px solid #353b48; transition: all 0.3s ease; cursor: pointer; }
        .option:hover { border-color: #f1c40f; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(241, 196, 15, 0.1); }
        .option h3 { margin-top: 0; color: #e1b12c; border-bottom: 1px dashed #555; padding-bottom: 5px; }
        
        .label { font-weight: bold; color: #00a8ff; }
        .phase-title { font-size: 1.2rem; color: #ecf0f1; margin-top: 0; margin-bottom: 5px;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Scape</h1>

    <div class="stats-panel" id="statsPanel">
        <h2>Account State: AI_grin</h2>
        <ul id="statsList">
            <li><strong>Stats:</strong> Attack 30, Strength 30, Agility 20, Thieving 25, Hitpoints 10</li>
            <li><strong>Quests:</strong> 1 Quest Point (Waterfall Quest completed)</li>
            <li><strong>Assets:</strong> GP from Silk, Stack of Cakes, Marks of Grace</li>
        </ul>
    </div>

    <div id="historyContainer"></div>

    <div id="currentPhaseContainer"></div>
</div>

<script>
    // 1. Core History Data (Phases 1-6 hardcoded)
    const initialHistory = [
        { phase: 1, title: "Phase 1: Early Capital", action: "Pickpocketing Lumbridge Men/Women (Thieving lvl 5)." },
        { phase: 2, title: "Phase 2: Food Security", action: "Stealing from Baker's Stalls in Ardougne." },
        { phase: 3, title: "Phase 3: Seed Capital", action: "Stealing Silk from Ardougne stalls." },
        { phase: 4, title: "Phase 4: Agility Base", action: "Gnome Stronghold Agility training." },
        { phase: 5, title: "Phase 5: Draynor Agility", action: "Training Agility to level 20." },
        { phase: 6, title: "Phase 6: Combat Skip", action: "Waterfall Quest (30 Atk/Str)." }
    ];

    // Load history from browser storage, or use initial if empty
    let history = JSON.parse(localStorage.getItem('osrsHistory')) || initialHistory;
    
    // Load current options from storage, or use Phase 7 defaults
    let currentOptions = JSON.parse(localStorage.getItem('osrsCurrentOptions')) || [
        { title: "Unlock Herblore", action: "Complete 'Druidic Ritual' quest." },
        { title: "Al Kharid Agility", action: "Train at Al Kharid Rooftop Course to Lvl 30." }
    ];

    // 2. Database of future OSRS Goals to generate NEW choices
    const futureQuests = [
        { title: "Witch's House", action: "Complete quest for massive early Hitpoints XP." },
        { title: "The Grand Tree", action: "Complete quest for Agility and Attack XP." },
        { title: "Tree Gnome Village", action: "Complete quest to unlock Spirit Tree transportation." },
        { title: "Fight Arena", action: "Complete quest for massive early Thieving and Melee XP." },
        { title: "Sea Slug", action: "Complete quest for fast, easy Fishing XP." },
        { title: "Fairy Tale Part 1", action: "Complete quest for Magic secateurs and Farming XP." }
    ];

    const futureSkilling = [
        { title: "Wintertodt Prep", action: "Train Firemaking to level 50 to access the minigame." },
        { title: "Barbarian Fishing", action: "Train Fishing to level 58 for passive Agility/Str XP." },
        { title: "Motherlode Mine", action: "Train Mining to level 30 to start gathering coal/gold." },
        { title: "Graceful Grind", action: "Grind Rooftop Agility until full Graceful outfit." },
        { title: "Ardougne Cloak 1", action: "Complete Easy Ardougne Diary for the teleport cloak." },
        { title: "Thieving to 50", action: "Blackjack or pickpocket to unlock Rogue's Den." }
    ];

    // 3. Render the Page
    function render() {
        const historyDiv = document.getElementById('historyContainer');
        const currentDiv = document.getElementById('currentPhaseContainer');
        
        // Clear containers
        historyDiv.innerHTML = '';
        currentDiv.innerHTML = '';

        // Render completed phases
        history.forEach(step => {
            historyDiv.innerHTML += `
                <div class="history-step">
                    <h2 class="phase-title">${step.title}</h2>
                    <p><span class="label">Action taken:</span> ${step.action}</p>
                </div>
            `;
        });

        // Render current phase with choices
        const nextPhaseNum = history.length + 1;
        currentDiv.innerHTML = `
            <div class="history-step current-step">
                <h2 class="phase-title">🔥 Phase ${nextPhaseNum}: New Decision</h2>
                <p>These are your new choices, choose wisely:</p>
                <div class="options-container">
                    <div class="option" onclick="makeChoice('${currentOptions[0].title}', '${currentOptions[0].action}')">
                        <h3>Option A: ${currentOptions[0].title}</h3>
                        <p><span class="label">Action:</span> ${currentOptions[0].action}</p>
                    </div>
                    <div class="option" onclick="makeChoice('${currentOptions[1].title}', '${currentOptions[1].action}')">
                        <h3>Option B: ${currentOptions[1].title}</h3>
                        <p><span class="label">Action:</span> ${currentOptions[1].action}</p>
                    </div>
                </div>
            </div>
        `;
    }

    // 4. Handle a Choice being clicked
    function makeChoice(chosenTitle, chosenAction) {
        const nextPhaseNum = history.length + 1;
        
        // Add choice to history
        history.push({
            phase: nextPhaseNum,
            title: `Phase ${nextPhaseNum}: ${chosenTitle}`,
            action: chosenAction
        });

        // Generate TWO NEW options for the next phase
        // We pick one random Quest and one random Skilling goal
        const randomQuest = futureQuests[Math.floor(Math.random() * futureQuests.length)];
        const randomSkill = futureSkilling[Math.floor(Math.random() * futureSkilling.length)];
        
        currentOptions = [randomQuest, randomSkill];

        // Save to browser memory
        localStorage.setItem('osrsHistory', JSON.stringify(history));
        localStorage.setItem('osrsCurrentOptions', JSON.stringify(currentOptions));

        // Update the screen
        render();
        
        // Smooth scroll to the new decision
        setTimeout(() => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 100);
    }

    // Initialize the page on load
    render();
</script>

</body>
</html>
